version: '3.8'

services:
  joomla:
    build: .
    container_name: joomla-app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mariadb:10.4
    container_name: joomla-db
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=root_password
      - MARIADB_DATABASE=joomla_db
      - MARIADB_USER=joomla
      - MARIADB_PASSWORD=joomla_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
